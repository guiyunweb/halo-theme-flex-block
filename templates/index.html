<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{layout :: common-head}"></th:block>
  <title th:text="${site.title}"></title>
</head>
<body>
<div class="root-container">
  <header class="header-container">
    <div class="post-image" th:style="|background-image:url(${theme.config.general.home_cover})|"></div>
    <th:block th:replace="~{modules/nav}"></th:block>
    <div class="header-content">
      <div class="post-text layout-block layout-padding">
        <h1 class="title-wrap" th:text="${site.title}"></h1>
      </div>
    </div>
  </header>

  <th:block th:replace="~{modules/post-list}"></th:block>

  <th:block th:replace="~{modules/pagination :: pagination(
    context = '/',
    prevUrl = ${posts.prevUrl},
    nextUrl = ${posts.nextUrl},
    totalPages = ${posts.totalPages},
    page = ${posts.page},
    hasPrevious = ${posts.hasPrevious()},
    hasNext = ${posts.hasNext()}
  )}"></th:block>

  <th:block th:replace="~{layout :: body-tail}"></th:block>
</div>
</body>
</html>
