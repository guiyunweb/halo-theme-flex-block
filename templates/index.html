<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${site.title}">site.title</title>
</head>
<body>
<h1>诊断页面 - index.html 自包含版本</h1>
<p>site.title = <span th:text="${site.title}">?</span></p>
<p>site.url = <span th:text="${site.url}">?</span></p>
<p>theme.assets.url = <span th:text="${theme.assets.url}">?</span></p>
<p>posts.total = <span th:text="${posts.total}">?</span></p>
<p>posts.items.size = <span th:text="${posts.items != null ? posts.items.size() : 0}">?</span></p>
<th:block th:each="post : ${posts.items}">
  <p>文章: <a th:href="${post.status.permalink}" th:text="${post.spec.title}">title</a></p>
</th:block>
</body>
</html>
