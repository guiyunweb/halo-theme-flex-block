<div class="body-container">
  <div class="content-container layout-block article-list">
    <th:block th:each="group : ${groups}">
      <div class="article-item layout-padding" th:each="link : ${group.links}">
        <article class="card-container article-card content-padding--large soft-size--large soft-style--box">
          <div class="card-text">
            <a th:href="${link.spec.url}" itemprop="url" target="_blank">
              <h2 class="card-text--title" th:text="${link.spec.displayName}"></h2>
            </a>
            <div class="card-text--row">
              <span th:text="${link.spec.description}"></span>
            </div>
          </div>
        </article>
      </div>
    </th:block>
  </div>
</div>
