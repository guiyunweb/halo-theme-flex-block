<section class="widget-author widget-item layout-margin content-padding--primary soft-size--large soft-style--box">
  <div class="widget-body">
    <img th:src="${theme.config.author_author_avatar}"
         class="soft-size--round soft-style--box"
         th:alt="${theme.config.author_author_avatar}" />
    <h2 th:text="${site.title}"></h2>
    <p th:text="${site.subtitle}"></p>
    <div class="count-box">
      <div class="count-box--item">
        <span>文章数：<span th:text="${postFinder.count()}">0</span></span>
      </div>
      <div class="count-box--item">
        <span>评论数：<span th:text="${commentFinder.count()}">0</span></span>
      </div>
      <div class="count-box--item">
        <span>标签数：<span th:text="${tagFinder.count()}">0</span></span>
      </div>
    </div>
  </div>
</section>
