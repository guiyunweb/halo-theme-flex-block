<section class="widget-author widget-item layout-margin content-padding--primary soft-size--large soft-style--box"
         th:fragment="widget-author"
         th:with="stats = ${siteStatsFinder.getStats()}"
         xmlns:th="http://www.thymeleaf.org">
  <div class="widget-body">
    <img th:src="${theme.config.author.author_avatar}"
         class="soft-size--round soft-style--box"
         th:alt="${theme.config.author.author_avatar}" />
    <h2 th:text="${site.title}"></h2>
    <p th:text="${site.subtitle}"></p>
    <div class="count-box">
      <div class="count-box--item">
        <span>文章数：<span th:text="${stats.post}">0</span></span>
      </div>
      <div class="count-box--item">
        <span>评论数：<span th:text="${stats.comment}">0</span></span>
      </div>
      <div class="count-box--item">
        <span>标签数：<span th:text="${#lists.size(tagFinder.listAll())}">0</span></span>
      </div>
    </div>
  </div>
</section>
